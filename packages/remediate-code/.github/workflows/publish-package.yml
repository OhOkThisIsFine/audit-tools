name: publish-package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publish_tag:
        description: "npm dist-tag override"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "latest"
          - "next"
          - "beta"
          - "rc"
  release:
    types: [published]

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_NODE_VERSION: "22.14.0"
  NPM_CONFIG_LOGLEVEL: notice

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Gate release to default branch
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        timeout-minutes: 1
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.ref_name }}"
          else
            TARGET="${{ github.event.release.target_commitish }}"
          fi
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [[ "$TARGET" != "$DEFAULT_BRANCH" ]]; then
            echo "::error::Live publish must run from the default branch ('${DEFAULT_BRANCH}'), but this run targets '${TARGET}'. Publish aborted. (Re-run workflow_dispatch with dry_run=true to validate from a non-default branch.)"
            exit 1
          fi
          echo "Publish targets '${TARGET}' — branch gate passed."
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Validate package-lock.json
        timeout-minutes: 2
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::package-lock.json is missing or malformed. Regenerate it with npm install and commit the updated lockfile before retrying publish."' ERR
          node -e "const fs=require('node:fs'); const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); if (typeof lock.lockfileVersion !== 'number') throw new Error('package-lock.json is missing lockfileVersion'); if (typeof lock.name !== 'string' || lock.name.length === 0) throw new Error('package-lock.json is missing package name'); console.log('Validated package-lock.json (lockfileVersion=' + lock.lockfileVersion + ', name=' + lock.name + ')');"
      - name: Upgrade npm for trusted publishing
        timeout-minutes: 5
        shell: bash
        # npm install -g does not support lockfile or integrity-hash verification.
        # The version pin (npm@11.5.1) provides registry-level immutability; supply-chain
        # risk is accepted here and is bounded by npm's own package-signing infrastructure.
        run: |
          set -euo pipefail
          trap 'echo "::error::Failed to install the required npm version for trusted publishing."' ERR
          npm install -g npm@11.5.1 --ignore-scripts
      - name: Print npm version
        timeout-minutes: 2
        shell: bash
        run: |
          set -euo pipefail
          npm --version
      - name: Install dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm ci failed. Inspect the uploaded publish npm logs artifact and rerun npm ci locally."' ERR
          npm ci
      - name: Verify release gate
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm run verify:release failed. Review the publish npm logs artifact and rerun npm run verify:release locally before retrying publish."' ERR
          npm run verify:release
      - name: Resolve publish metadata
        id: publish_meta
        timeout-minutes: 2
        shell: bash
        env:
          INPUT_PUBLISH_TAG: ${{ inputs.publish_tag }}
        run: |
          set -euo pipefail
          trap 'echo "::error::Failed to resolve publish metadata from package.json."' ERR
          PACKAGE_NAME=$(node -e "process.stdout.write(require('./package.json').name)")
          PACKAGE_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if [[ -n "$INPUT_PUBLISH_TAG" && "$INPUT_PUBLISH_TAG" != "auto" ]]; then
            PUBLISH_TAG="$INPUT_PUBLISH_TAG"
          elif [[ "$PACKAGE_VERSION" == *-* ]]; then
            PUBLISH_TAG="next"
          else
            PUBLISH_TAG="latest"
          fi
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "publish_tag=$PUBLISH_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved publish target: ${PACKAGE_NAME}@${PACKAGE_VERSION} -> ${PUBLISH_TAG}"
          MODE="live"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            MODE="dry-run"
          fi
          {
            echo "### Publish plan"
            echo "- package: ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            echo "- dist-tag: ${PUBLISH_TAG}"
            echo "- mode: ${MODE}"
            echo "- Node: ${{ env.RELEASE_NODE_VERSION }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Preview packed tarball contents
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm pack --dry-run failed. Fix the packed artifact before attempting a publish."' ERR
          npm pack --dry-run
      - name: Publish to npm (trusted publishing / tokenless OIDC)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == 'false' }}
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm publish failed. Download the publish-npm-logs artifact, rerun workflow_dispatch with dry_run=true, and confirm npm Trusted Publishing is configured for publish-package.yml."' ERR
          npm publish --access public --tag "${{ steps.publish_meta.outputs.publish_tag }}"
      - name: Dry run publish (no upload)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm publish --dry-run failed. Fix the package manifest or packed artifact before retrying a live publish."' ERR
          npm publish --dry-run --access public --tag "${{ steps.publish_meta.outputs.publish_tag }}"
      - name: Verify published package is installable
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == 'false' }}
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::The registry did not resolve the expected package version after publish. Verify npm propagation and dist-tag selection before retrying."' ERR
          PACKAGE_NAME="${{ steps.publish_meta.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.publish_meta.outputs.package_version }}"
          PUBLISH_TAG="${{ steps.publish_meta.outputs.publish_tag }}"
          echo "Verifying ${PACKAGE_NAME}@${PACKAGE_VERSION} is resolvable on the registry (tag: ${PUBLISH_TAG})..."
          START_TIME=$(date +%s)
          for attempt in {1..24}; do
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version; then
              ELAPSED=$(( $(date +%s) - START_TIME ))
              echo "Registry propagation succeeded after ${attempt} attempt(s) (${ELAPSED}s elapsed)."
              exit 0
            fi
            ELAPSED=$(( $(date +%s) - START_TIME ))
            if [[ "$attempt" -lt 24 ]]; then
              echo "Registry propagation is still pending after attempt ${attempt} (${ELAPSED}s elapsed); retrying in 10 seconds..."
              sleep 10
            fi
          done
          exit 1
      - name: Upload npm debug logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: publish-npm-logs
          path: |
            ~/.npm/_logs
            npm-debug.log*
          if-no-files-found: ignore
      - name: Emit troubleshooting guidance
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::error::Publish workflow failed on Node ${{ env.RELEASE_NODE_VERSION }}. Review the publish-npm-logs artifact, rerun npm ci && npm run verify:release locally, and use workflow_dispatch with dry_run=true before retrying a live publish."
