name: ci

on:
  push:
    branches:
      - main
    paths:
      # A gate's trigger paths must cover every path the gate INSPECTS.
      # verify:checks runs check:doc-manifest, which guards docs/ — without
      # docs/** a docs-only push plants a violation CI never runs, which then
      # detonates on the next unrelated src/ commit. Happened 2026-07-19.
      - docs/**
      - src/**
      - tests/**
      - schemas/**
      - dispatch/**
      - templates/**
      - skills/**
      - scripts/**
      - "*.mjs"
      - .github/workflows/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.base.json
      - vitest.config.ts
  pull_request:
    branches:
      - main
    paths:
      # A gate's trigger paths must cover every path the gate INSPECTS.
      # verify:checks runs check:doc-manifest, which guards docs/ — without
      # docs/** a docs-only push plants a violation CI never runs, which then
      # detonates on the next unrelated src/ commit. Happened 2026-07-19.
      - docs/**
      - src/**
      - tests/**
      - schemas/**
      - dispatch/**
      - templates/**
      - skills/**
      - scripts/**
      - "*.mjs"
      - .github/workflows/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.base.json
      - vitest.config.ts

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_NODE_VERSION: "22.14.0"
  NPM_CONFIG_LOGLEVEL: notice

jobs:
  # ci.yml runs only the cheap deterministic chain (`checks` → verify:checks).
  # The vitest suite is owned by audit-code-test-suite.yml, which runs it once per
  # Node line (20 + 22), each sharded 4 ways — so the suite is not re-run here on
  # Node 22 (that was a pure duplicate of audit-code-test-suite.yml's Node-22 line).
  # The release-time authoritative gate still lives in publish-package.yml.
  # This `checks` job carries a release-bump skip guard: the `release: vX.Y.Z`
  # commit's authoritative gate runs on Linux in publish-package.yml, so re-running
  # it here is a pure duplicate. The predicate is version-digit-anchored (GitHub
  # expressions have no regex): it matches only `release: v<digit>...` — the exact
  # bump-commit format emitted by scripts/release-and-publish.mjs (`release: vX.Y.Z`)
  # — so a non-bump message that merely shares the prefix (e.g. `release: verify
  # hosts...`) does NOT skip CI (CE-004). Keep this predicate identical to the one
  # in audit-code-test-suite.yml.
  checks:
    if: >-
      ${{ github.event_name != 'push'
          || !(startsWith(github.event.head_commit.message, 'release: v0')
            || startsWith(github.event.head_commit.message, 'release: v1')
            || startsWith(github.event.head_commit.message, 'release: v2')
            || startsWith(github.event.head_commit.message, 'release: v3')
            || startsWith(github.event.head_commit.message, 'release: v4')
            || startsWith(github.event.head_commit.message, 'release: v5')
            || startsWith(github.event.head_commit.message, 'release: v6')
            || startsWith(github.event.head_commit.message, 'release: v7')
            || startsWith(github.event.head_commit.message, 'release: v8')
            || startsWith(github.event.head_commit.message, 'release: v9')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
      - name: Validate package-lock.json
        timeout-minutes: 2
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::package-lock.json is missing or malformed. Regenerate it with npm install and commit the updated lockfile before retrying CI."' ERR
          node -e "const fs=require('node:fs'); const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); if (typeof lock.lockfileVersion !== 'number') throw new Error('package-lock.json is missing lockfileVersion'); if (typeof lock.name !== 'string' || lock.name.length === 0) throw new Error('package-lock.json is missing package name'); console.log('Validated package-lock.json (lockfileVersion=' + lock.lockfileVersion + ', name=' + lock.name + ')');"
      - name: Install dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm ci failed. Inspect the uploaded ci-npm-logs artifact and rerun npm ci locally to reproduce."' ERR
          npm ci --prefer-offline --no-audit --no-fund
      - name: Verify release checks (non-test gate)
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm run verify:checks failed. Download the ci-npm-logs artifact and rerun npm run verify:checks locally before retrying."' ERR
          npm run verify:checks
      - name: Upload npm debug logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-npm-logs-checks
          path: |
            ~/.npm/_logs
            npm-debug.log*
          if-no-files-found: ignore
      - name: Emit troubleshooting guidance
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::error::audit-tools CI checks failed. Review the ci-npm-logs-checks artifact, confirm package-lock.json is committed, and rerun npm ci && npm run verify:checks locally."
