name: ci

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - schemas/**
      - dispatch/**
      - templates/**
      - skills/**
      - scripts/**
      - "*.mjs"
      - .github/workflows/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.base.json
      - vitest.config.ts
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - schemas/**
      - dispatch/**
      - templates/**
      - skills/**
      - scripts/**
      - "*.mjs"
      - .github/workflows/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.base.json
      - vitest.config.ts

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_NODE_VERSION: "22.14.0"
  NPM_CONFIG_LOGLEVEL: notice

jobs:
  # The verify:release gate is split into the cheap deterministic chain (`checks`)
  # and the vitest suite sharded N ways (`test`) so PR/push feedback is bounded by
  # the slowest job, not the sum. Mirrors publish-package.yml. Both jobs carry the
  # same release-bump skip guard: the `release: vX.Y.Z` commit's authoritative gate
  # runs on Linux in publish-package.yml, so re-running it here is a pure duplicate.
  checks:
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'release: v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
      - name: Validate package-lock.json
        timeout-minutes: 2
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::package-lock.json is missing or malformed. Regenerate it with npm install and commit the updated lockfile before retrying CI."' ERR
          node -e "const fs=require('node:fs'); const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); if (typeof lock.lockfileVersion !== 'number') throw new Error('package-lock.json is missing lockfileVersion'); if (typeof lock.name !== 'string' || lock.name.length === 0) throw new Error('package-lock.json is missing package name'); console.log('Validated package-lock.json (lockfileVersion=' + lock.lockfileVersion + ', name=' + lock.name + ')');"
      - name: Install dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm ci failed. Inspect the uploaded ci-npm-logs artifact and rerun npm ci locally to reproduce."' ERR
          npm ci --prefer-offline --no-audit --no-fund
      - name: Verify release checks (non-test gate)
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm run verify:checks failed. Download the ci-npm-logs artifact and rerun npm run verify:checks locally before retrying."' ERR
          npm run verify:checks
      - name: Upload npm debug logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-npm-logs-checks
          path: |
            ~/.npm/_logs
            npm-debug.log*
          if-no-files-found: ignore
      - name: Emit troubleshooting guidance
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::error::audit-tools CI checks failed. Review the ci-npm-logs-checks artifact, confirm package-lock.json is committed, and rerun npm ci && npm run verify:checks locally."

  test:
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'release: v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Keep the denominator in the `vitest run --shard` command below in sync
      # with the length of this list.
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::npm ci failed. Inspect the uploaded ci-npm-logs-test artifact and rerun npm ci locally to reproduce."' ERR
          npm ci --prefer-offline --no-audit --no-fund
      - name: Build
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          npm run build
      - name: Run tests (shard ${{ matrix.shard }}/4)
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "::error::vitest shard ${{ matrix.shard }}/4 failed. Download the ci-npm-logs-test artifact and rerun npx vitest run --shard=${{ matrix.shard }}/4 locally before retrying."' ERR
          npx vitest run --shard=${{ matrix.shard }}/4
      - name: Upload npm debug logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-npm-logs-test-shard-${{ matrix.shard }}
          path: |
            ~/.npm/_logs
            npm-debug.log*
          if-no-files-found: ignore
