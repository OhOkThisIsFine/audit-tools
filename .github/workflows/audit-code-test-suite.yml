name: audit-code-test-suite

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - schemas/**
      - dispatch/**
      - templates/**
      - skills/**
      - scripts/**
      - "*.mjs"
      - .github/workflows/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.base.json
      - vitest.config.ts
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - schemas/**
      - dispatch/**
      - templates/**
      - skills/**
      - scripts/**
      - "*.mjs"
      - .github/workflows/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.base.json
      - vitest.config.ts

concurrency:
  group: audit-code-test-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NPM_CONFIG_LOGLEVEL: notice

jobs:
  orchestration-tests:
    name: Orchestration tests (Node ${{ matrix.node-version }}, shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Sole suite runner: the vitest suite runs once per Node line, sharded 4
      # ways (not the full suite whole). ci.yml carries only verify:checks now,
      # so this workflow owns both Node lines. The Node-20 line is the distinct
      # type-stripping coverage ci.yml (Node 22 only) lacks.
      # Keep the denominator in the `vitest run --shard` command below in sync
      # with the length of this shard list.
      matrix:
        node-version:
          - "20.19.2"
          - "22.14.0"
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Validate package-lock.json
        timeout-minutes: 2
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          trap 'echo "::error::package-lock.json is missing or malformed. Regenerate it with npm install and commit the updated lockfile before retrying CI."' ERR
          node -e "const fs=require('node:fs'); const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); if (typeof lock.lockfileVersion !== 'number') throw new Error('package-lock.json is missing lockfileVersion'); if (typeof lock.name !== 'string' || lock.name.length === 0) throw new Error('package-lock.json is missing package name'); console.log('Validated package-lock.json (lockfileVersion=' + lock.lockfileVersion + ', name=' + lock.name + ')');"
      - name: Install dependencies
        timeout-minutes: 10
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          trap 'echo "::error::npm ci failed. Inspect the uploaded audit-code-test-suite npm logs artifact and rerun npm ci locally."' ERR
          npm ci
      - name: Type-check
        timeout-minutes: 10
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          trap 'echo "::error::npm run check failed. Review the uploaded audit-code-test-suite npm logs artifact and confirm the TypeScript build is green locally."' ERR
          npm run check
      - name: Build
        timeout-minutes: 10
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          trap 'echo "::error::npm run build failed. Review the uploaded audit-code-test-suite npm logs artifact and rerun npm run build locally."' ERR
          npm run build
      - name: Run tests (shard ${{ matrix.shard }}/4)
        timeout-minutes: 15
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          trap 'echo "::error::vitest shard ${{ matrix.shard }}/4 failed on Node ${{ matrix.node-version }}. Review the uploaded audit-code-test-suite npm logs artifact and rerun npx vitest run --shard=${{ matrix.shard }}/4 locally on the same Node line."' ERR
          npx vitest run --shard=${{ matrix.shard }}/4
      - name: Upload npm debug logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-code-test-suite-npm-logs-node-${{ matrix.node-version }}-shard-${{ matrix.shard }}
          path: |
            ~/.npm/_logs
            npm-debug.log*
          if-no-files-found: ignore
      - name: Emit troubleshooting guidance
        if: ${{ failure() }}
        shell: bash
        working-directory: .
        run: |
          echo "::error::audit-code test-suite workflow failed on Node ${{ matrix.node-version }} (shard ${{ matrix.shard }}/4). Review the uploaded npm logs artifact and rerun npm ci && npx vitest run --shard=${{ matrix.shard }}/4 locally on the same Node line."
